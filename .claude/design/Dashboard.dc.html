<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/tokens/colors.css">
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/tokens/typography.css">
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/tokens/base.css">
  <link rel="stylesheet" href="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/styles.css">
  <script src="_ds/screener-9a78573a-150b-4a39-a7b4-eb3c1671c4dd/_ds_bundle.js"></script>
</helmet>

<div data-screen-label="Dashboard" style="width: 1600px; min-height: 100vh; background: var(--color-bg); box-sizing: border-box; font-family: var(--font-sans); color: var(--color-text);">

  <!-- ============ Header ============ -->
  <header style="display: flex; align-items: center; gap: 24px; padding: 0 32px; height: 60px; border-bottom: 1px solid var(--color-border); background: var(--color-surface-marketing); position: sticky; top: 0; z-index: 10;">

    <!-- Brand -->
    <div style="display: flex; align-items: center; gap: 11px;">
      <span style="width: 14px; height: 14px; background: var(--color-accent); transform: rotate(45deg); border-radius: 2px;"></span>
      <span style="font-family: var(--font-mono); font-size: 15px; font-weight: 500; letter-spacing: 0.24em; color: var(--color-text-strong);">SCREENER</span>
    </div>

    <span style="width: 1px; height: 22px; background: var(--color-border);"></span>

    <!-- Watchlist context -->
    <div style="display: flex; align-items: baseline; gap: 8px;">
      <span style="font-family: var(--font-sans); font-size: 13px; color: var(--color-text-muted);">Watchlist</span>
      <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: var(--color-text-dim);">{{ tickerCount }} TICKERS</span>
    </div>

    <div style="flex: 1;"></div>

    <!-- Qty / dollar toggle -->
    <div style="display: flex; align-items: center; gap: 9px;">
      <span style="font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; color: var(--color-text-dim);">SIZE AS</span>
      <div style="display: inline-flex; align-items: center; gap: 2px; padding: 3px; background: var(--surface-well); border: 1px solid var(--color-border); border-radius: 8px;">
        <button onClick="{{ setQty }}" style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; background: {{ qtyBg }}; color: {{ qtyColor }}; transition: background-color 150ms ease, color 150ms ease;">QTY</button>
        <button onClick="{{ setDollars }}" style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; background: {{ dollarBg }}; color: {{ dollarColor }}; transition: background-color 150ms ease, color 150ms ease;">$ USD</button>
      </div>
    </div>

    <span style="width: 1px; height: 22px; background: var(--color-border);"></span>

    <!-- Settings -->
    <button title="Settings" style="display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: transparent; border: 1px solid var(--color-border-input); border-radius: 8px; color: var(--color-text-muted); font-size: 16px; cursor: pointer; transition: background-color 150ms ease, color 150ms ease;" style-hover="background: rgba(255,255,255,0.05); color: var(--color-text-strong)">⚙</button>

    <!-- Log out -->
    <button style="font-family: var(--font-sans); font-size: 13px; padding: 8px 16px; background: transparent; border: 1px solid var(--color-border-input); border-radius: 8px; color: var(--color-text-muted); cursor: pointer; white-space: nowrap; transition: background-color 150ms ease, color 150ms ease;" style-hover="background: rgba(255,255,255,0.05); color: var(--color-text-strong)">Log out</button>

    <!-- Profile -->
    <button onClick="{{ onProfile }}" title="Account" style="display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; padding: 0; border-radius: 999px; background: color-mix(in oklab, var(--color-accent) 18%, transparent); border: 1px solid {{ profileRing }}; color: var(--color-accent); font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: border-color 150ms ease;">AR</button>

  </header>

  <!-- ============ Grid of order books ============ -->
  <main style="padding: 28px 32px 48px;">
    <div style="display: grid; grid-template-columns: repeat({{ gridCols }}, 1fr); gap: 20px; align-items: start;">
      <sc-for list="{{ cards }}" as="c" hint-placeholder-count="10">
        <dc-import name="Orderbook" variant="{{ variant }}" notional="{{ notionalMode }}" tier0="{{ tier0 }}" tier1="{{ tier1 }}" tier2="{{ tier2 }}" tier3="{{ tier3 }}" tier4="{{ tier4 }}" fill-opacity="{{ fillOpacity }}" symbol="{{ c.symbol }}" market="{{ c.market }}" base-price="{{ c.basePrice }}" live="{{ live }}" show-mid-price="{{ showMidPrice }}" show-column-headers="{{ showColumnHeaders }}" hint-size="100%,420px"></dc-import>
      </sc-for>
    </div>
  </main>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;1a&quot;,&quot;1b&quot;,&quot;1c&quot;,&quot;1d&quot;],&quot;default&quot;:&quot;1d&quot;,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;'1a' | '1b' | '1c' | '1d'&quot;},&quot;notional&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dollars&quot;,&quot;qty&quot;],&quot;default&quot;:&quot;dollars&quot;,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;'dollars' | 'qty'&quot;},&quot;tier0&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;hidden&quot;,&quot;faint&quot;],&quot;default&quot;:&quot;hidden&quot;,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;'hidden' | 'faint'&quot;},&quot;showMidPrice&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showColumnHeaders&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;boolean&quot;},&quot;tier1&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#57ff92&quot;,&quot;section&quot;:&quot;Tier colors&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tier2&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#f7bb18&quot;,&quot;section&quot;:&quot;Tier colors&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tier3&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ff8080&quot;,&quot;section&quot;:&quot;Tier colors&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tier4&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#a12eff&quot;,&quot;section&quot;:&quot;Tier colors&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;fillOpacity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:26,&quot;min&quot;:0,&quot;max&quot;:100,&quot;step&quot;:1,&quot;unit&quot;:&quot;%&quot;,&quot;section&quot;:&quot;Tier colors&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;columns&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:5,&quot;min&quot;:3,&quot;max&quot;:5,&quot;step&quot;:1,&quot;unit&quot;:&quot; cols&quot;,&quot;section&quot;:&quot;Layout&quot;,&quot;tsType&quot;:&quot;number&quot;},&quot;live&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;section&quot;:&quot;Order books&quot;,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { mode: props.notional ?? 'dollars', touched: false, profileActive: false };
  }

  tickers() {
    return [
      { symbol: 'BTCUSDT', market: 'FUT', basePrice: 68450.5 },
      { symbol: 'ETHUSDT', market: 'FUT', basePrice: 3820.4 },
      { symbol: 'SOLUSDT', market: 'FUT', basePrice: 172.42 },
      { symbol: 'XRPUSDT', market: 'SPOT', basePrice: 1.1372 },
      { symbol: 'BNBUSDT', market: 'FUT', basePrice: 604.18 },
      { symbol: 'DOGEUSDT', market: 'SPOT', basePrice: 0.16423 },
      { symbol: 'ADAUSDT', market: 'FUT', basePrice: 0.45213 },
      { symbol: 'AVAXUSDT', market: 'SPOT', basePrice: 38.72 },
      { symbol: 'LINKUSDT', market: 'FUT', basePrice: 17.854 },
      { symbol: 'SUIUSDT', market: 'FUT', basePrice: 4.2131 },
    ];
  }

  renderVals() {
    const mode = this.state.touched ? this.state.mode : (this.props.notional ?? 'dollars');
    const isQty = mode === 'qty';
    const cols = Math.max(3, Math.min(5, this.props.columns ?? 4));
    const list = this.tickers();

    const activeBg = 'var(--color-accent)';
    const activeColor = 'var(--color-bg)';
    const idleBg = 'transparent';
    const idleColor = 'var(--color-text-muted)';

    return {
      tickerCount: list.length,
      cards: list.map((t, i) => ({ ...t, key: i })),
      variant: this.props.variant ?? '1a',
      notionalMode: mode,
      live: this.props.live ?? true,
      showMidPrice: this.props.showMidPrice ?? true,
      showColumnHeaders: this.props.showColumnHeaders ?? true,
      tier0: this.props.tier0 ?? 'hidden',
      tier1: this.props.tier1 ?? '#3edc97',
      tier2: this.props.tier2 ?? '#f5b84d',
      tier3: this.props.tier3 ?? '#f26d6d',
      tier4: this.props.tier4 ?? '#b48cf7',
      fillOpacity: this.props.fillOpacity ?? 40,
      gridCols: cols,
      qtyBg: isQty ? activeBg : idleBg,
      qtyColor: isQty ? activeColor : idleColor,
      dollarBg: !isQty ? activeBg : idleBg,
      dollarColor: !isQty ? activeColor : idleColor,
      profileRing: this.state.profileActive
        ? 'var(--color-accent)'
        : 'color-mix(in oklab, var(--color-accent) 40%, transparent)',
      setQty: () => this.setState({ mode: 'qty', touched: true }),
      setDollars: () => this.setState({ mode: 'dollars', touched: true }),
      onProfile: () => this.setState((s) => ({ profileActive: !s.profileActive })),
    };
  }
}
</script>
</body>
</html>
